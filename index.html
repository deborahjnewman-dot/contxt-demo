<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="light">
<title>Contxt — Live Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --paper:#F7F4EF; --ink:#1C1917; --ink-mid:#44403C; --ink-light:#78716C; --ink-faint:#A8A29E; --rule:#E2DDD8;
  --dark-bg:#241F1C;
  --c-dot:#52B788; --c-col:#2D6A4F; --c-bg:rgba(82,183,136,0.1);
  --cl-dot:#C9A84C; --cl-col:#8B6914; --cl-bg:rgba(201,168,76,0.1);
  --d-dot:#D97706; --d-col:#92400E; --d-bg:rgba(217,119,6,0.1);
  --u-dot:#7DB8E8; --u-col:#1E3F5C; --u-bg:rgba(125,184,232,0.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--dark-bg);color:var(--ink);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;touch-action:none;user-select:none;color-scheme:light;}

/* ── SCREENS ── */
#screen-input, #screen-brief{position:fixed;inset:0;transition:opacity 0.5s ease;}
#screen-input{display:flex;flex-direction:column;justify-content:center;align-items:center;padding:40px 28px;background:var(--dark-bg);z-index:10;}
#screen-brief{opacity:0;pointer-events:none;z-index:5;}
#screen-brief.visible{opacity:1;pointer-events:auto;}
#screen-input.hidden{opacity:0;pointer-events:none;}

/* ── INPUT SCREEN ── */
.input-logo{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:rgba(247,244,239,0.5);margin-bottom:48px;}
.input-title{font-family:'Playfair Display',serif;font-size:clamp(24px,6vw,30px);font-weight:400;color:#F7F4EF;text-align:center;line-height:1.25;margin-bottom:10px;letter-spacing:0.01em;}
.input-sub{font-size:13px;font-weight:300;color:rgba(247,244,239,0.45);text-align:center;margin-bottom:40px;line-height:1.5;}
.input-wrap{width:100%;max-width:380px;display:flex;flex-direction:column;gap:12px;}
.topic-input{
  width:100%;padding:16px 18px;
  background:rgba(247,244,239,0.06);
  border:1px solid rgba(247,244,239,0.15);
  border-radius:0;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:300;
  color:#F7F4EF;
  outline:none;
  transition:border-color 0.2s;
  -webkit-appearance:none;
}
.topic-input::placeholder{color:rgba(247,244,239,0.3);}
.topic-input:focus{border-color:rgba(247,244,239,0.4);}
.gen-btn{
  width:100%;padding:16px;
  background:#F7F4EF;color:#1C1917;
  border:none;border-radius:0;
  font-family:'DM Mono',monospace;font-size:11px;font-weight:500;
  letter-spacing:0.16em;text-transform:uppercase;
  cursor:pointer;
  transition:opacity 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.gen-btn:active{opacity:0.8;}
.gen-btn:disabled{opacity:0.35;cursor:not-allowed;}
.example-topics{margin-top:24px;display:flex;flex-direction:column;gap:8px;width:100%;max-width:380px;}
.ex-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(247,244,239,0.25);margin-bottom:4px;}
.ex-topic{font-size:12px;font-weight:300;color:rgba(247,244,239,0.35);cursor:pointer;padding:4px 0;transition:color 0.15s;-webkit-tap-highlight-color:transparent;}
.ex-topic:active{color:rgba(247,244,239,0.7);}

/* ── LOADING ── */
.loading-screen{
  position:fixed;inset:0;background:var(--dark-bg);
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  gap:20px;z-index:20;
  opacity:0;pointer-events:none;transition:opacity 0.3s;
}
.loading-screen.visible{opacity:1;pointer-events:auto;}
.loading-topic{font-family:'Playfair Display',serif;font-size:18px;font-weight:400;color:rgba(247,244,239,0.7);text-align:center;padding:0 32px;line-height:1.4;}
.loading-status{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(247,244,239,0.35);}
.loading-dots{display:flex;gap:6px;}
.loading-dots span{width:5px;height:5px;border-radius:50%;background:rgba(247,244,239,0.3);animation:pulse 1.2s ease-in-out infinite;}
.loading-dots span:nth-child(2){animation-delay:0.2s;}
.loading-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes pulse{0%,100%{opacity:0.3;}50%{opacity:1;}}

/* ── PROGRESS ── */
.prog{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;gap:3px;padding:10px 16px 0;}
.prog-seg{flex:1;height:2px;border-radius:2px;overflow:hidden;}
.prog-seg.dark-bg{background:rgba(247,244,239,0.15);}
.prog-seg.light-bg{background:rgba(28,25,23,0.1);}
.prog-fill{height:100%;width:0;border-radius:2px;transition:width 0.3s ease;}

/* ── TOPBAR ── */
.topbar{position:fixed;top:18px;left:0;right:0;z-index:99;display:flex;align-items:center;justify-content:space-between;padding:0 20px;pointer-events:none;}
.logo{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:rgba(247,244,239,0.6);transition:color 0.45s;}
.snum{font-family:'DM Mono',monospace;font-size:11px;color:rgba(247,244,239,0.6);letter-spacing:0.14em;transition:color 0.45s;}

/* ── SLIDES ── */
.deck{width:100%;height:100dvh;position:relative;}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:80px 24px 76px;opacity:0;pointer-events:none;transition:opacity 0.45s ease;overflow-y:auto;overflow-x:hidden;}
.slide.active{opacity:1;pointer-events:auto;}
.s-dark{background:var(--dark-bg);}
.s-light{background:var(--paper);}

/* ── COVER ── */
.cover-tag{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(247,244,239,0.6);display:flex;align-items:center;gap:10px;margin-bottom:22px;}
.cover-tag::before{content:'';display:block;width:14px;height:1px;background:rgba(247,244,239,0.45);}
.cover-title{font-family:'Playfair Display',serif;font-size:clamp(26px,6.5vw,32px);font-weight:400;line-height:1.2;letter-spacing:0.02em;color:rgba(247,244,239,0.88);margin-bottom:28px;}

/* STATUS BAR */
.status-bar-wrap{display:flex;flex-direction:column;gap:5px;margin-bottom:22px;padding-bottom:20px;border-bottom:1px solid rgba(247,244,239,0.08);}
.status-bar{display:flex;gap:3px;height:7px;border-radius:4px;overflow:hidden;}
.sb-seg{border-radius:0;}
.status-labels{display:flex;gap:3px;}
.sb-lbl{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;}

/* SUMMARY ROWS */
.summary-rows{display:flex;flex-direction:column;gap:18px;margin-bottom:22px;}
.sum-row{display:flex;align-items:baseline;gap:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.sum-lbl{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;flex-shrink:0;width:96px;padding-right:8px;}
.sum-txt{font-size:15px;color:rgba(247,244,239,0.75);line-height:1.5;font-weight:300;}
.sum-txt strong{font-weight:600;color:rgba(247,244,239,0.95);}
.cover-hint{font-size:11px;color:rgba(247,244,239,0.6);display:flex;align-items:center;gap:6px;letter-spacing:0.03em;font-family:'DM Mono',monospace;}

/* ── SECTION ── */
.sec-header{display:flex;align-items:center;gap:9px;margin-bottom:18px;}
.sec-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sec-lbl{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;}
.sec-rule{flex:1;height:1px;background:var(--rule);}
.sec-hl{font-family:'Playfair Display',serif;font-size:clamp(20px,5.2vw,24px);font-weight:400;line-height:1.2;letter-spacing:0.01em;color:var(--ink);margin-bottom:22px;}

/* ── FACTS ── */
.facts{display:flex;flex-direction:column;}
.fact{display:grid;grid-template-columns:2px 1fr;gap:0 13px;padding:10px 14px;border-bottom:none;align-items:start;margin-bottom:16px;}
.fact:last-child{margin-bottom:0;}
.bar{align-self:stretch;border-radius:2px;min-height:18px;}
.bar-c{background:var(--c-dot);} .bar-cl{background:var(--cl-dot);} .bar-d{background:var(--d-dot);} .bar-u{background:var(--u-dot);}
.fact-c{background:var(--c-bg);} .fact-cl{background:var(--cl-bg);} .fact-d{background:var(--d-bg);} .fact-u{background:var(--u-bg);}
.ftxt{font-size:15px;font-weight:300;line-height:1.6;color:var(--ink);margin-bottom:4px;}
.ftxt strong{font-weight:700;}
.fsrc{font-size:10.5px;color:var(--ink-faint);}
.fsrc a{color:var(--ink-faint);text-decoration:none;border-bottom:1px dotted var(--rule);}

/* ── QUOTE ── */
.qcard{margin:6px 0 3px;padding:11px 13px;border-radius:0;}
.qc-cl{background:rgba(201,168,76,0.08);}
.qcard p{font-size:13px;font-weight:400;line-height:1.5;color:var(--ink);margin-bottom:5px;}
.qcard .attr{font-size:10px;font-weight:500;color:var(--ink-light);letter-spacing:0.02em;}

/* ── DISPUTED ── */
.disp-q{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:10px;}
.disp-pos{display:grid;grid-template-columns:2px 1fr;gap:0 12px;align-items:start;margin-bottom:0;}
.disp-div{height:1px;background:rgba(28,25,23,0.08);margin:8px 0 8px 14px;}

/* ── SOURCES ── */
.src-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(247,244,239,0.6);margin-bottom:12px;}
.src-principle{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:300;font-style:italic;line-height:1.65;color:rgba(247,244,239,0.82);margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid rgba(247,244,239,0.08);}
.src-principle strong{font-weight:700;color:rgba(247,244,239,0.98);}
.src-list{display:flex;flex-direction:column;margin-bottom:22px;}
.src-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(247,244,239,0.07);}
.src-item:last-child{border-bottom:none;}
.src-n{font-size:15px;flex-shrink:0;font-family:'Apple Color Emoji','Segoe UI Emoji',sans-serif;}
.src-t{font-size:12px;line-height:1.4;color:rgba(247,244,239,0.52);}
.src-t a{color:rgba(247,244,239,0.72);text-decoration:none;border-bottom:1px dotted rgba(247,244,239,0.2);}
.src-btns{display:flex;gap:8px;}
.sbtn{flex:1;padding:13px 8px;font-family:'DM Mono',monospace;font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;font-weight:500;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;text-decoration:none;-webkit-tap-highlight-color:transparent;}
.sbtn-copy{background:rgba(247,244,239,0.08);color:rgba(247,244,239,0.65);border:1px solid rgba(247,244,239,0.12);}
.sbtn-new{background:#F7F4EF;color:#1C1917;}

/* ── NAV ── */
.nav{position:fixed;bottom:20px;left:0;right:0;display:flex;justify-content:center;gap:28px;z-index:60;pointer-events:none;}
.nbtn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;border:none;cursor:pointer;pointer-events:auto;-webkit-tap-highlight-color:transparent;transition:opacity 0.2s,background 0.45s,color 0.45s;}
.nbtn-light{background:rgba(28,25,23,0.07);color:var(--ink-light);}
.nbtn-dark{background:rgba(247,244,239,0.1);color:rgba(247,244,239,0.5);}
.nbtn:disabled{opacity:0.18;pointer-events:none;}

/* ── ERROR ── */
.error-msg{font-size:13px;font-weight:300;color:rgba(247,244,239,0.5);text-align:center;padding:0 32px;line-height:1.6;}

@keyframes up{from{opacity:0;transform:translateY(9px);}to{opacity:1;transform:translateY(0);}}
.slide.active>*{animation:up 0.4s ease both;}
.slide.active>*:nth-child(1){animation-delay:0.08s;}
.slide.active>*:nth-child(2){animation-delay:0.14s;}
.slide.active>*:nth-child(3){animation-delay:0.2s;}
.slide.active>*:nth-child(4){animation-delay:0.26s;}
.slide.active>*:nth-child(5){animation-delay:0.31s;}
.slide.active>*:nth-child(6){animation-delay:0.35s;}
</style>
</head>
<body>

<!-- INPUT SCREEN -->
<div id="screen-input">
  <div class="input-logo">Contxt</div>
  <h1 class="input-title">What story are you trying to understand?</h1>
  <p class="input-sub">Type a topic or news event. We'll find the facts,<br>the claims, and the disputes in real time.</p>
  <div class="input-wrap">
    <input class="topic-input" id="topicInput" type="text" placeholder="e.g. US drug boat strikes" maxlength="120" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="gen-btn" id="genBtn" onclick="generateBrief()">Generate Brief</button>
    <button class="gen-btn" id="demoBtn" onclick="loadDemo()" style="background:rgba(247,244,239,0.08);color:rgba(247,244,239,0.5);border:1px solid rgba(247,244,239,0.15);margin-top:-4px;">Demo Mode</button>
  </div>
  <div class="example-topics">
    <div class="ex-label">Try these</div>
    <div class="ex-topic" onclick="setTopic(this)">US military drug boat strikes</div>
    <div class="ex-topic" onclick="setTopic(this)">Gaza ceasefire negotiations</div>
    <div class="ex-topic" onclick="setTopic(this)">AI regulation in the EU</div>
  </div>
</div>

<!-- LOADING SCREEN -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-dots"><span></span><span></span><span></span></div>
  <div class="loading-topic" id="loadingTopic"></div>
  <div class="loading-status" id="loadingStatus">Searching sources</div>
</div>

<!-- BRIEF SCREEN -->
<div id="screen-brief">
  <div class="prog" id="prog"></div>
  <div class="topbar">
    <div class="logo" id="logo">Contxt</div>
    <div class="snum" id="snum">1 / 6</div>
  </div>
  <div class="deck" id="deck"></div>
  <div class="nav">
    <button class="nbtn nbtn-dark" id="prev" onclick="nav(-1)" disabled>←</button>
    <button class="nbtn nbtn-dark" id="next" onclick="nav(1)">→</button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `You are Contxt, a structured news briefing system. Research the given topic and respond with ONLY a valid JSON object — no markdown, no backticks, no explanation. Start with { and end with }.

RULES:
- Never issue verdicts or show bias
- Quotes must be 100% verbatim
- Bold leads each sentence (use the "bold" field for the opening phrase)
- No em-dashes, no colons after names
- Keep facts tight and clear
- Use real, verifiable sources

Respond with this exact JSON structure:
{
  "topic": "Short plain title",
  "tag": "Category · Region",
  "confirmed": {
    "headline": "What the record shows",
    "facts": [
      {"bold": "Opening bold phrase", "text": "rest of sentence", "source": "Source name, date", "url": "https://..."}
    ]
  },
  "claimed": {
    "headline": "What each side says",
    "positions": [
      {"bold": "Entity name + position", "text": "detail", "quote": "verbatim quote or empty string", "attribution": "name, title, date", "source": "source", "url": "https://..."}
    ]
  },
  "disputed": {
    "headline": "The core fights",
    "fights": [
      {"question": "The disputed question", "side1": "first position", "side1_source": "source", "side1_url": "https://...", "side2": "second position", "side2_source": "source", "side2_url": "https://..."}
    ]
  },
  "unknown": {
    "headline": "What no one can answer yet",
    "gaps": [
      {"bold": "What is unknown", "text": "why it is unknown", "source": "", "url": ""}
    ]
  },
  "sources": [
    {"flag": "🇺🇸", "name": "Source description", "url": "https://..."}
  ]
}`;

function setTopic(el) {
  document.getElementById('topicInput').value = el.textContent;
  document.getElementById('topicInput').focus();
}

function showLoading(topic) {
  document.getElementById('loadingTopic').textContent = topic;
  document.getElementById('loadingScreen').classList.add('visible');
  const statuses = ['Searching sources', 'Evaluating credibility', 'Structuring brief', 'Almost ready'];
  let i = 0;
  return setInterval(() => {
    i = (i + 1) % statuses.length;
    document.getElementById('loadingStatus').textContent = statuses[i];
  }, 2500);
}

async function generateBrief() {
  const topic = document.getElementById('topicInput').value.trim();
  if (!topic) return;

  const btn = document.getElementById('genBtn');
  btn.disabled = true;

  const statusInterval = showLoading(topic);
  document.getElementById('screen-input').classList.add('hidden');

  try {
    const response = await fetch('/.netlify/functions/brief', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: `Create a Contxt brief for this topic: "${topic}". Use your knowledge of current events. Return ONLY the JSON object. Limit to: 2 facts in confirmed, 2 positions in claimed, 2 fights in disputed, 2 gaps in unknown, 4 sources. Keep each text field under 20 words. Include real URLs.` }]
      })
    });

    clearInterval(statusInterval);
    document.getElementById('loadingScreen').classList.remove('visible');

    if (!response.ok) throw new Error(`API error: ${response.status}`);

    const data = await response.json();
    const fullText = data.content
      .filter(b => b.type === 'text')
      .map(b => b.text)
      .join('');

    // Extract JSON - clean it up first
    let jsonMatch = fullText.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('No JSON in response');
    let jsonStr = jsonMatch[0];
    // Fix common JSON issues from the model
    jsonStr = jsonStr.replace(/,\s*}/g, '}').replace(/,\s*]/g, ']');
    let brief;
    try {
      brief = JSON.parse(jsonStr);
    } catch(e) {
      // Try to extract partial JSON
      throw new Error('Brief format error - please try again');
    }

    renderBrief(brief);

  } catch (err) {
    clearInterval(statusInterval);
    document.getElementById('loadingScreen').classList.remove('visible');
    document.getElementById('screen-input').classList.remove('hidden');
    btn.disabled = false;
    alert('Error: ' + err.message);
    console.error(err);
  }
}

function renderBrief(b) {
  const deck = document.getElementById('deck');
  const prog = document.getElementById('prog');
  deck.innerHTML = '';
  prog.innerHTML = '';

  const sections = [
    { key: 'cover', dark: true, color: 'rgba(247,244,239,0.45)' },
    { key: 'confirmed', dark: false, color: '#52B788' },
    { key: 'claimed', dark: false, color: '#C9A84C' },
    { key: 'disputed', dark: false, color: '#D97706' },
    { key: 'unknown', dark: false, color: '#7DB8E8' },
    { key: 'sources', dark: true, color: 'rgba(247,244,239,0.45)' },
  ];

  sections.forEach((s, i) => {
    const seg = document.createElement('div');
    seg.className = `prog-seg ${s.dark ? 'dark-bg' : 'light-bg'}`;
    seg.id = `ps${i}`;
    seg.innerHTML = `<div class="prog-fill" style="background:${s.color}"></div>`;
    prog.appendChild(seg);
  });

  // SLIDE 1: COVER
  const statusData = [
    { key: 'c', color: '#52B788', label: 'Confirmed', facts: b.confirmed?.facts || [] },
    { key: 'cl', color: '#C9A84C', label: 'Claimed', facts: b.claimed?.positions || [] },
    { key: 'd', color: '#D97706', label: 'Disputed', facts: b.disputed?.fights || [] },
    { key: 'u', color: '#7DB8E8', label: 'Unknown', facts: b.unknown?.gaps || [] },
  ];

  const barSegs = statusData.map(s => `<div class="sb-seg" style="flex:${Math.max(1, s.facts.length)};background:${s.color};"></div>`).join('');
  const barLabels = statusData.map(s => `<div class="sb-lbl" style="flex:${Math.max(1, s.facts.length)};color:${s.color};">${s.label}</div>`).join('');

  const summaryRows = [
    { color: '#52B788', label: 'Confirmed', text: b.confirmed?.facts?.[0] ? `<strong>${b.confirmed.facts[0].bold}</strong> ${b.confirmed.facts[0].text}` : 'See confirmed facts', slide: 1 },
    { color: '#C9A84C', label: 'Claimed', text: b.claimed?.positions?.[0] ? `<strong>${b.claimed.positions[0].bold}</strong> ${b.claimed.positions[0].text}` : 'See claims', slide: 2 },
    { color: '#D97706', label: 'Disputed', text: b.disputed?.fights?.[0] ? `<strong>${b.disputed.fights[0].question}</strong>` : 'See disputes', slide: 3 },
    { color: '#7DB8E8', label: 'Unknown', text: b.unknown?.gaps?.[0] ? `<strong>${b.unknown.gaps[0].bold}</strong> ${b.unknown.gaps[0].text}` : 'See unknowns', slide: 4 },
  ].map(r => `
    <div class="sum-row" onclick="goTo(${r.slide})">
      <span class="sum-lbl" style="color:${r.color};">${r.label}</span>
      <span class="sum-txt">${r.text}</span>
    </div>`).join('');

  addSlide(deck, 0, 's-dark', `
    <div class="cover-tag">${b.tag || 'Breaking News'}</div>
    <h1 class="cover-title">${b.topic}</h1>
    <div class="status-bar-wrap">
      <div class="status-bar">${barSegs}</div>
      <div class="status-labels">${barLabels}</div>
    </div>
    <div class="summary-rows">${summaryRows}</div>
    <div class="cover-hint">→ Tap a section or swipe to read</div>
  `);

  // SLIDE 2: CONFIRMED
  const confirmedFacts = (b.confirmed?.facts || []).map(f => `
    <div class="fact fact-c">
      <div class="bar bar-c"></div>
      <div>
        <p class="ftxt"><strong>${f.bold}</strong> ${f.text}</p>
        <p class="fsrc"><a href="${f.url || '#'}" target="_blank">${f.source}</a></p>
      </div>
    </div>`).join('');

  addSlide(deck, 1, 's-light', `
    <div class="sec-header">
      <span class="sec-dot" style="background:var(--c-dot)"></span>
      <span class="sec-lbl" style="color:var(--c-col)">Confirmed</span>
      <div class="sec-rule"></div>
    </div>
    <div class="sec-hl">${b.confirmed?.headline || 'What the record shows'}</div>
    <div class="facts">${confirmedFacts}</div>
  `);

  // SLIDE 3: CLAIMED
  const claimedPositions = (b.claimed?.positions || []).map(p => `
    <div class="fact fact-cl">
      <div class="bar bar-cl"></div>
      <div>
        <p class="ftxt"><strong>${p.bold}</strong> ${p.text}</p>
        ${p.quote ? `<div class="qcard qc-cl"><p>"${p.quote}"</p><p class="attr">- ${p.attribution}</p></div>` : ''}
        <p class="fsrc"><a href="${p.url || '#'}" target="_blank">${p.source}</a></p>
      </div>
    </div>`).join('');

  addSlide(deck, 2, 's-light', `
    <div class="sec-header">
      <span class="sec-dot" style="background:var(--cl-dot)"></span>
      <span class="sec-lbl" style="color:var(--cl-col)">Claimed</span>
      <div class="sec-rule"></div>
    </div>
    <div class="sec-hl">${b.claimed?.headline || 'What each side says'}</div>
    <div class="facts">${claimedPositions}</div>
  `);

  // SLIDE 4: DISPUTED
  const disputes = (b.disputed?.fights || []).map(f => `
    <div class="fact fact-d" style="display:block;padding:10px 14px;">
      <p class="disp-q">${f.question}</p>
      <div class="disp-pos">
        <div class="bar bar-d"></div>
        <div><p class="ftxt" style="margin:0;">${f.side1}</p><p class="fsrc"><a href="${f.side1_url || '#'}" target="_blank">${f.side1_source}</a></p></div>
      </div>
      <div class="disp-div"></div>
      <div class="disp-pos">
        <div class="bar bar-d"></div>
        <div><p class="ftxt" style="margin:0;">${f.side2}</p><p class="fsrc"><a href="${f.side2_url || '#'}" target="_blank">${f.side2_source}</a></p></div>
      </div>
    </div>`).join('');

  addSlide(deck, 3, 's-light', `
    <div class="sec-header">
      <span class="sec-dot" style="background:var(--d-dot)"></span>
      <span class="sec-lbl" style="color:var(--d-col)">Disputed</span>
      <div class="sec-rule"></div>
    </div>
    <div class="sec-hl">${b.disputed?.headline || 'The core fights'}</div>
    <div class="facts">${disputes}</div>
  `);

  // SLIDE 5: UNKNOWN
  const unknowns = (b.unknown?.gaps || []).map(g => `
    <div class="fact fact-u">
      <div class="bar bar-u"></div>
      <div>
        <p class="ftxt"><strong>${g.bold}</strong> ${g.text}</p>
        ${g.source ? `<p class="fsrc"><a href="${g.url || '#'}" target="_blank">${g.source}</a></p>` : ''}
      </div>
    </div>`).join('');

  addSlide(deck, 4, 's-light', `
    <div class="sec-header">
      <span class="sec-dot" style="background:var(--u-dot)"></span>
      <span class="sec-lbl" style="color:var(--u-col)">Unknown</span>
      <div class="sec-rule"></div>
    </div>
    <div class="sec-hl">${b.unknown?.headline || 'What no one can answer yet'}</div>
    <div class="facts">${unknowns}</div>
  `);

  // SLIDE 6: SOURCES
  const sourceList = (b.sources || []).map(s => `
    <div class="src-item">
      <span class="src-n">${s.flag}</span>
      <span class="src-t"><a href="${s.url || '#'}" target="_blank">${s.name}</a></span>
    </div>`).join('');

  addSlide(deck, 5, 's-dark', `
    <div class="src-lbl">About this brief</div>
    <p class="src-principle">When <strong>news is breaking</strong> and you don't know <strong>what's true</strong> or <strong>who to trust</strong>, Contxt cuts through the confusion. We give you the <strong>facts</strong>, <strong>on-demand</strong> and in <strong>real time</strong>. The opinion is yours.</p>
    <div class="src-list">${sourceList}</div>
    <div class="src-btns">
      <button class="sbtn sbtn-copy" onclick="copyLink()">⎘ Copy link</button>
      <button class="sbtn sbtn-new" onclick="newBrief()">New brief</button>
    </div>
  `);

  document.getElementById('screen-brief').classList.add('visible');
  window._briefSlides = deck.querySelectorAll('.slide');
  window._briefTotal = 6;
  window._briefCur = 0;
  // Force first slide visible immediately
  const firstSlide = deck.querySelector('.slide');
  if (firstSlide) {
    firstSlide.classList.add('active');
    firstSlide.style.opacity = '1';
    firstSlide.style.pointerEvents = 'auto';
  }
  setTimeout(() => goTo(0), 100);
}

function addSlide(deck, i, cls, html) {
  const s = document.createElement('div');
  s.className = `slide ${cls}`;
  s.dataset.i = i;
  s.innerHTML = html;
  deck.appendChild(s);
}

let cur = 0, tx = 0, ty = 0, drag = false;

function goTo(n) {
  const slides = document.querySelectorAll('.slide');
  const total = slides.length;
  if (n < 0 || n >= total || n === cur) return;

  slides[cur].style.opacity = '0';
  const old = cur;
  setTimeout(() => { 
    slides[old].classList.remove('active'); 
    slides[old].style.opacity = ''; 
    slides[old].style.pointerEvents = '';
  }, 450);

  cur = n;
  slides[cur].classList.add('active');

  const DARK = new Set([0, 5]);
  const dark = DARK.has(cur);
  const fills = document.querySelectorAll('.prog-fill');
  const segs = document.querySelectorAll('.prog-seg');

  segs.forEach((s, i) => {
    s.className = `prog-seg ${dark ? 'dark-bg' : 'light-bg'}`;
    const f = fills[i];
    f.style.transition = 'none';
    f.style.width = i <= cur ? '100%' : '0%';
    if (i === cur) requestAnimationFrame(() => { f.style.transition = 'width 0.3s ease'; });
  });

  const logo = document.getElementById('logo');
  const snum = document.getElementById('snum');
  const prev = document.getElementById('prev');
  const next = document.getElementById('next');

  logo.style.color = dark ? 'rgba(247,244,239,0.6)' : '';
  snum.style.color = dark ? 'rgba(247,244,239,0.6)' : '';
  prev.className = `nbtn ${dark ? 'nbtn-dark' : 'nbtn-light'}`;
  next.className = `nbtn ${dark ? 'nbtn-dark' : 'nbtn-light'}`;
  snum.textContent = `${cur + 1} / ${total}`;
  prev.disabled = cur === 0;
  next.disabled = cur === total - 1;
}

function nav(d) { goTo(cur + d); }

function newBrief() {
  document.getElementById('screen-brief').classList.remove('visible');
  document.getElementById('screen-input').classList.remove('hidden');
  document.getElementById('topicInput').value = '';
  document.getElementById('genBtn').disabled = false;
  cur = 0;
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href).catch(() => {});
  const b = document.querySelector('.sbtn-copy');
  b.textContent = '✓ Copied';
  setTimeout(() => { b.textContent = '⎘ Copy link'; }, 2000);
}

// Touch + keyboard nav
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; drag = true; }, { passive: true });
document.addEventListener('touchend', e => {
  if (!drag) return; drag = false;
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) nav(dx < 0 ? 1 : -1);
}, { passive: true });
document.addEventListener('click', e => {
  if (!document.getElementById('screen-brief').classList.contains('visible')) return;
  if (e.target.closest('a,button,.sum-row,.sbtn')) return;
  const x = e.clientX / window.innerWidth;
  if (x < 0.25) nav(-1); else if (x > 0.75) nav(1);
});
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nav(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') nav(-1);
});
document.getElementById('topicInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') generateBrief();
});
